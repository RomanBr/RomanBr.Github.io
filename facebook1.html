<!DOCTYPE html>
<html xmlns:fb="http://ogp.me/ns/fb#">
	<head>
		<meta charset="utf-8">
        <meta http-equiv="content-type" content="text/html; charset=UTF-8"> 
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
		<title>Post to Multiple Facebook Groups</title>
		<meta name="robots" content="noindex, nofollow">
		
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
		<link rel="stylesheet" title="Default Style" href="Main.css">
		<!-- Global site tag (gtag.js) - Google Analytics -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=UA-115749034-1"></script>
		<!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
		<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
		<!--[if lt IE 9]>
			  <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
			  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
			<![endif]-->

	</head>
	<body>
		<div id="fb-root"></div>
		<input type = "hidden" id = "myID" name = "myID" />
		<br/>
		<div class="container-fluid">
			<div class="row content row-eq-height">
				<div class="equalheight">      
					
					<div class="col-lg-2 col-sm-2 col-xs-2 navbar-fixed-top" id = "profile"> 
					</div>

					<div class = "col-lg-8 col-sm-8 col-xs-8" id = "form">
						<form class="form-horizontal">
							<div class="form-group" style = "display: none;">
								<div class="col-lg-6">
									<fb:login-button id = "loginBtn" scope="public_profile,email, user_birthday, user_friends,publish_actions" onlogin="checkLoginState();"></fb:login-button>
									<!--<div class="fb-login-button" id = "loginBtn" data-size="small" data-button-type="login_with" 
									data-show-faces="false" data-auto-logout-link="false" data-use-continue-as="false" 
									onlogin="checkLoginState();"></div>-->
									<label id="status"></label>
								</div>
							</div>
							<div class="form-group row">
								<label for="link" class="col-lg-2 control-label">Link</label>
								<div class="col-lg-6">
									<input type="text" value="" class="form-control" id="link" placeholder="Your link goes here.">
								</div>
							</div>
							<div class="form-group row">
								<label for="message" class="col-lg-2 control-label">Message</label>
								<div class="col-lg-6">
									<textarea class="form-control" rows="3" placeholder="Type your message here." id="message"></textarea>
								</div>
							</div>
							<div class="form-group row">
								<label for="groups" class="col-lg-2 control-label">Groups</label>
								<div class="col-lg-6">
									<select multiple="" class="form-control" id="groups" size = "7"></select>
									<span class="help-block">Select your groups.</span>
								</div>
							</div>
							<div class="form-group row">
								<label for="friends" class="col-lg-2 control-label">Friends</label>
								<div class="col-lg-6">
									<select multiple="" class="form-control col-lg-4" id="friends" size = "7"></select>
									<span class="help-block">Select your friends.</span>
								</div>
							</div>
							<div class="form-group row">
								<div class="col-lg-4 col-lg-offset-2">
									<!--<button type="button" onclick="post();" class="btn btn-primary">Post to Groups</button>-->
									<button type="button" onclick="onButtonClick();" class="btn btn-primary">Post to Groups</button>
								</div>
							</div>
						</form>
					</div>
					
				</div>
			</div>
		</div>

	</body>
</html>
