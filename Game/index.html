<body>
    <h1>Lets Do It. </h1>
	
	<table id="sudoku">
		<thead/>
        <tbody id="sudokuBoard">
        </tbody>
		<tfoot>	
			<tr id="buttonRow btn-group">
				<td colspan="3"><button id="checkButton" class="btn1 btn btn-default" onclick="checkTheBoard();">Check my answer</button></td>
				<td colspan="3"><button id="showButton" class="btn1 btn btn-default" onclick="showValues();">Show the Answer</button></td>
				<td colspan="3"><button id="restartButton" class="btn1 btn btn-default" onclick="start();">Restart</button></td>
			</tr>
			<tr>
				<td colspan = "9"><hr/></td>
			</tr>
			<tr>
				<td colspan = "9" id="timerDiv">
					<div id="timerButton">
						<button class="btn btn-default" onclick="startStopTimer();" title="Start game"><span>Start Game</span></button>
					</div>
					<div id="spanDiv">
						<span id="minutes">00</span>
						<span>:</span>
						<span id="seconds">00</label>
					</div>
				</td>
			</tr>
		</tfoot>
    </table>
