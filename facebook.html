<!DOCTYPE html>
<html xmlns:fb="http://ogp.me/ns/fb#">
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Post to Multiple Facebook Groups</title>
<meta name="robots" content="noindex, nofollow">
<!-- Bootstrap -->
<link href="//maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css" rel="stylesheet">
<!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
<!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>

<body>
    <script>
        // This is called with the results from from FB.getLoginStatus().
        function statusChangeCallback(response) {
            console.log('statusChangeCallback');
            console.log(response);
            // The response object is returned with a status field that lets the
            // app know the current login status of the person.
            // Full docs on the response object can be found in the documentation
            // for FB.getLoginStatus().
            if (response.status === 'connected') {
                // Logged into your app and Facebook.
                testAPI();
            } else if (response.status === 'not_authorized') {
                // The person is logged into Facebook, but not your app.
                document.getElementById('status').innerHTML = 'Please log ' +
                    'into this app.';
            } else {
                // The person is not logged into Facebook, so we're not sure if
                // they are logged into this app or not.
                document.getElementById('status').innerHTML = 'Please log ' +
                    'into Facebook.';
				FB.login();	
            }
        }

         // This function is called when someone finishes with the Login
         // Button.  See the onlogin handler attached to it in the sample
         // code below.
        function checkLoginState() {
            FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
            });
        }

        window.fbAsyncInit = function() {
			FB.init({
				appId            : '1616981855234875',
				autoLogAppEvents : true,
				xfbml            : true,
				cookie			 : true,
				version          : 'v2.12'
			});
            // Now that we've initialized the JavaScript SDK, we call 
            // FB.getLoginStatus().  This function gets the state of the
            // person visiting this page and can return one of three states to
            // the callback you provide.  They can be:
            //
            // 1. Logged into your app ('connected')
            // 2. Logged into Facebook, but not your app ('not_authorized')
            // 3. Not logged into Facebook and can't tell if they are logged into
            //    your app or not.
            //
            // These three cases are handled in the callback function.

            FB.getLoginStatus(function(response) {
                statusChangeCallback(response);
            });

        };

         // Load the SDK asynchronously
		(function(d, s, id){
		var js, fjs = d.getElementsByTagName(s)[0];
			if (d.getElementById(id)) {return;}
			js = d.createElement(s); js.id = id;
			js.src = "https://connect.facebook.net/en_US/sdk.js";
			fjs.parentNode.insertBefore(js, fjs);
		}(document, 'script', 'facebook-jssdk'));
         // Here we run a very simple test of the Graph API after login is
         // successful.  See statusChangeCallback() for when this call is made.
        function testAPI() {
            console.log('Welcome!  Fetching your information.... ');
            FB.api('/me', function(response) {
                console.log('Successful login for: ' + response.name);
                document.getElementById('status').innerHTML =
                    'Thanks for logging in, ' + response.name + '!';
            });
        }

         // This function reads your Facebook groups.
        function getMyGroups() {
            FB.api('/me/groups', function(response) {
                var groupList = document.getElementById('groups');
                response.data.forEach(function(group) {
                    var opt = document.createElement("option");
                    opt.value = group.id;
                    opt.innerHTML = group.name;
                    groupList.appendChild(opt);
                });
            }, {
                scope: 'user_groups,publish_actions'
            });
        }

		function getGroups () {
            alert("12");
			FB.api('/me/groups', function(response) {
                var groupList = document.getElementById('groups');
                if (response.error) {
					console.log(response.error);
					return;
				}
				
				response.data.forEach(function(group) {
                    //var opt = document.createElement("option");
                    //opt.value = group.id;
                    alert(group.name);
                    console.log(group.name + ",");
					//groupList.appendChild(opt);
                });
            }, {
                scope: 'user_groups,publish_actions'
            });
		}

		function qw () {
					FB.ui({
			  method: 'share_open_graph',
			  action_type: 'og.likes',
			  action_properties: JSON.stringify({
				object:'https://developers.facebook.com/docs/',
			  })
			}, function(response){
			  // Debug response (optional)
			  console.log(response);
			});
		
		}
    </script>
    <div class="container">
        <br />
        <form class="form-horizontal">
            <div class="form-group">
                <div class="col-lg-10 col-lg-offset-2">
                    <!--
                    Below we include the Login Button social plugin. This button uses
                    the JavaScript SDK to present a graphical Login button that triggers
                    the FB.login() function when clicked.
                    -->
                    <fb:login-button scope="public_profile,email,user_groups,publish_actions" onlogin="checkLoginState();"></fb:login-button>
					<div class="fb-login-button" data-max-rows="1" data-size="small" data-button-type="login_with" data-show-faces="true" data-auto-logout-link="true" data-use-continue-as="false"></div>
                    <div id="status"></div>
                </div>
            </div>
			<br/>
            <div class="form-group">
                <label for="groups" class="col-lg-2 control-label">Groups</label>
                <div class="col-lg-10">
                    <select multiple="" class="form-control" id="groups">
                    </select>
                    <span class="help-block">Select your groups.</span>
                    <button type="button" onclick="getGroups();" class="btn btn-success">Load Groups</button>
                    <button type="button" onclick="qw();" class="btn btn-success">QW</button>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
