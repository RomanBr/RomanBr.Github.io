	<body>
		<div id="fb-root"></div>
		<input type = "hidden" id = "myID" name = "myID" />
		<input type = "hidden" id = "profs" name = "profs" />
		<br/>
		<div class="container-fluid">
			<div class="row">
				<form class="form-horizontal">
					<div class="form-group row">
						<div class="col-lg-6 col-lg-offset-2">
							<fb:login-button id = "loginBtn" scope="public_profile,email,user_birthday,user_friends,publish_actions" onlogin="checkLoginState();"
							autologoutlink="true"></fb:login-button>
							<!--<div class="fb-login-button" id = "loginBtn" data-size="small" data-button-type="login_with" 
							data-show-faces="false" data-auto-logout-link="false" data-use-continue-as="false" 
							onlogin="checkLoginState();"></div>-->
							<span id="status" class = "label label-success"></span>
						</div>
					</div>
					<nav class="col-lg-offset-2">
						<ul class="pagination col-lg-offset-2" >
							<li class="page-item text-left disabled" id = "previousLink">
								<a class="page-link disabled" href="javascript:void(0);" onclick = "loadPosts (previous);">Previous</a>
							</li>
							<li class="page-item text-right" id = "nextLink">
								<a class="page-link" href="javascript:void(0);" onclick = "loadPosts (next);">Next</a>
							</li>
						</ul>
					</nav>					
					<div class="row col-lg-offset-4" id = "form" name = "form">
					</div>
				</form>
			</div>
		</div>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
		<script>
			var previous, next;
			users = ["268108602075"];

			window.fbAsyncInit = function() {
				FB.init({
					appId            : '1616981855234875',
					autoLogAppEvents : true,
					xfbml            : true,
					cookie			 : true,
					status			 : true,
					oauth			 : true,
					version          : 'v2.12'
				});
				
				FB.AppEvents.logPageView();				
				checkLoginState ();	
				
				FB.Event.subscribe('auth.authResponseChange', auth_response_change_callback);
				FB.Event.subscribe('auth.statusChange', auth_status_change_callback);
				
				FB.Event.subscribe('comment.create', comment_callback);
				FB.Event.subscribe('comment.remove', comment_callback);
				
			};

			(function(d, s, id) {
			  var js, fjs = d.getElementsByTagName(s)[0];
			  if (d.getElementById(id)) return;
			  js = d.createElement(s); js.id = id;
			  js.src = 'https://connect.facebook.net/en_GB/sdk.js#xfbml=1&version=v2.12&appId=1616981855234875&autoLogAppEvents=1';
			  fjs.parentNode.insertBefore(js, fjs);
			}(document, 'script', 'facebook-jssdk'));

			 // This function is called when someone finishes with the Login
			 // Button.  See the onlogin handler attached to it in the sample
			 // code below.
			
			function checkLoginState() {
				FB.getLoginStatus(statusChangeCallback);
			}

			// This is called with the results from from FB.getLoginStatus().
			
			function statusChangeCallback(response) {
				console.log('statusChangeCallback');
				console.log(response);
				// The response object is returned with a status field that lets the
				// app know the current login status of the person.
				// Full docs on the response object can be found in the documentation
				// for FB.getLoginStatus().
				if (response.status === 'connected') {
					document.getElementById('status').innerHTML = '';
					showPosts ();

				} else if (response.status === 'not_authorized') {
					document.getElementById('status').innerHTML = 'Please log into this app.';

				} else {
					document.getElementById('status').innerHTML = 'Please log ' +
						'into Facebook.';
				}
			}
			
			var auth_response_change_callback = function(response) {
			  console.log ("auth_response_change_callback");
			  console.log (response);
			}

			var auth_status_change_callback = function(response) {
			  console.log ("auth_status_change_callback: " + response.status);
			}
			
			var comment_callback = function(response) {
			  console.log("comment_callback");
			  console.log(response);
			}
			
			function showPosts () {
				FB.api('/268108602075/feed', 'GET', {"fields":"id"}, 
				function(response) {
					if (response.error) { alert ("Error"); return; }
					loadPosts (response);
				});
				
			}

			function loadPosts (response) {
				var data = response.data;
				if(response.paging.next){
					$.getJSON(response.paging.next, function(response){                
						next = response;
					});
					nextLink.setAttribute("class", "page-item text-left");
				} 
				else { nextLink.setAttribute("class", "page-item text-left disabled"); }
				
				if(response.paging.previous){
					$.getJSON(response.paging.previous, function(response){                
						previous = response;
					});
					previousLink.setAttribute("class", "page-item text-right");
				} 
				else { previousLink.setAttribute("class", "page-item text-right disabled"); }

				form.innerHTML = "";
				for (i = 0; i < data.length; i++) {
					addPost (data[i].id);
				}
				
				/*var elements = document.getElementsByClassName("fb-post");
				for (i = 0; i < elements.length; i++) {
					FB.XFBML.parse(elements[i]);
				}*/
			}
			
			function addPost (id) {
				FB.api('/' + id, 'GET', {"fields":"permalink_url"},
				function(response) {
					if (response.error) { alert ("Error:" + id); return; }
					url = response.permalink_url;
					var div = document.createElement("div");
					div.setAttribute("class", "form-group row"); 
					
					var iframe = document.createElement("iframe");
					iframe.setAttribute("src", "https://www.facebook.com/plugins/post.php?href=" + url); 
					iframe.setAttribute("class", "fb-post");
					//iframe.setAttribute("width", "500"); 
					iframe.setAttribute("style", "border:none; overflow:hidden;"); 
					iframe.setAttribute("scrolling", "no"); 
					iframe.setAttribute("frameborder", "0"); 
					iframe.setAttribute("allowTransparency", "true");
					/*var div1 = document.createElement("div");
					div1.setAttribute("class", "fb-post");
					div1.setAttribute("data-href", url);
					div1.setAttribute("data-width","500")
					div1.setAttribute("data-show-text","true");*/
					
					var a = document.createElement("a")
					a.setAttribute("class", "btn btn-primary");
					a.setAttribute("href", url);
					a.setAttribute("target", "_blank");
					a.setAttribute("role","button");
					a.innerHTML = url
					
					div.appendChild(a);
					div.innerHTML += "<br/>"
					div.appendChild(iframe);
					form.appendChild(div);
					form.innerHTML += "<br/>"
				});
			}
		</script>
