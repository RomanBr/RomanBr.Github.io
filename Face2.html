	<body>
		<div class="form-group row">
			<label for="friends" class="col-lg-2 control-label">Users</label>
			<div class="col-lg-6">
				<select class="form-control col-lg-4" id="users" name = "users" size = "7"></select>
				<div id = "info" name = "info"></div>
			</div>
		</div>
		<script>
		var user = {};
		addUsers ();
		for (var x in user) {
			var opt = document.createElement("option");
			opt.value = x;
			opt.title = x;
			opt.innerHTML = user[x].name;
			opt.ondblclick = function () {
				setProfInfo (this.value);
			}

			users.appendChild(opt);			
		}
		info.innerHTML = "";

		
		function setProfInfo (id) {
			function addProfileInfo (txt) {
				document.getElementById('info').innerHTML += 
				"<span class='control-label bg-info col-lg-12 text-left'>" + txt + "</span><br/>";
			}
			info.innerHTML = "";
			addProfileInfo('Name: ' + user[id].name);
			addProfileInfo('First name: ' + user[id].first_name);
			addProfileInfo('Last name: ' + user[id].last_name);
			addProfileInfo('Birthday: ' +  user[id].birthday);
			addProfileInfo('ID: ' +  user[id].id);
			addProfileInfo('Email: ' +  user[id].email);
		}
